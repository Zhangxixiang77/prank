<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>深度性格测评</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --card: #ffffff;
    --accent: #3d5a80;
    --accent2: #e07a5f;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e5e0d8;
    --radius: 18px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 0;
  }

  .app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; flex: 1; padding: 32px 24px 40px; }
  .screen.active { display: flex; }

  /* ── INTRO ── */
  .intro-header {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding-top: 24px;
  }

  .logo-ring {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
    box-shadow: 0 8px 32px rgba(61,90,128,0.18);
  }

  .logo-ring svg { width: 48px; height: 48px; }

  .intro-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .intro-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 36px;
  }

  .info-card {
    width: 100%;
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 32px;
    border: 1px solid var(--border);
  }

  .info-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    font-size: 14px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-row strong { color: var(--text); font-weight: 500; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

  .btn-primary {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary:active { transform: scale(0.97); background: #2d4a70; }

  /* ── QUESTION ── */
  .q-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .q-counter {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .q-pct {
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }

  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .progress-fill {
    height: 4px;
    background: linear-gradient(90deg, var(--accent), #5b8ec4);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .q-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px 20px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    min-height: 110px;
    display: flex;
    align-items: center;
  }

  .q-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    line-height: 1.7;
    color: var(--text);
  }

  .options { display: flex; flex-direction: column; gap: 12px; flex: 1; }

  .opt-btn {
    width: 100%;
    text-align: left;
    padding: 16px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    line-height: 1.5;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .opt-btn:active { transform: scale(0.98); background: #eef2f7; border-color: var(--accent); }

  /* ── LOADING ── */
  #screen-loading {
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .loading-spinner {
    width: 64px; height: 64px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 28px auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }

  .loading-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .loading-steps {
    margin-top: 28px;
    text-align: left;
    width: 100%;
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 20px;
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    line-height: 2.2;
    min-height: 80px;
  }

  /* ── RESULT ── */
  #screen-result {
    align-items: center;
    justify-content: flex-start;
  }

  .result-label {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 8px;
    margin-top: 8px;
    text-align: center;
  }

  .result-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 24px;
    text-align: center;
    letter-spacing: 1px;
  }

  .result-img-wrap {
    width: 100%;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    background: #eee;
  }

  .result-img-wrap img {
    width: 100%;
    display: block;
  }

  .result-type {
    margin-top: 20px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    border: 1px solid var(--border);
    text-align: center;
  }

  .type-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .type-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
  }

  .btn-secondary {
    margin-top: 20px;
    width: 100%;
    padding: 16px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-secondary:active { background: var(--border); }
</style>
</head>
<body>
<div class="app">

  <!-- INTRO -->
  <div class="screen active" id="screen-intro">
    <div class="intro-header">
      <div class="logo-ring">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="18" r="9" stroke="white" stroke-width="2.5"/>
          <path d="M10 40c0-7.732 6.268-14 14-14s14 6.268 14 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="intro-title">深度性格测评</div>
      <div class="intro-sub">Stanford Behavioral Research Lab</div>

      <div class="info-card">
        <div class="info-row"><div class="dot"></div><span>共 <strong>10</strong> 道测题，约需 <strong>3 分钟</strong></span></div>
        <div class="info-row"><div class="dot"></div><span>基于 <strong>MBTI</strong> 与荣格心理学模型</span></div>
        <div class="info-row"><div class="dot"></div><span>已有 <strong>2,847,391</strong> 人完成</span></div>
        <div class="info-row"><div class="dot"></div><span>结果准确率 <strong>94.7%</strong></span></div>
      </div>

      <button class="btn-primary" onclick="startTest()">开始测评</button>
    </div>
  </div>

  <!-- QUESTION -->
  <div class="screen" id="screen-question">
    <div class="q-top">
      <span class="q-counter" id="q-counter">第 1 / 10 题</span>
      <span class="q-pct" id="q-pct">10%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:10%"></div>
    </div>
    <div class="q-card">
      <p class="q-text" id="q-text"></p>
    </div>
    <div class="options" id="q-options"></div>
  </div>

  <!-- LOADING -->
  <div class="screen" id="screen-loading">
    <div class="loading-title" id="loading-title">正在分析你的回答…</div>
    <div class="loading-sub" id="loading-sub">正在构建神经行为模型</div>
    <div class="loading-spinner"></div>
    <div class="loading-steps" id="loading-steps"></div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="result-label">测评结果</div>
    <div class="result-title">你的性格类型揭晓</div>
    <div class="result-img-wrap">
      <img id="result-img" src="./1.png" alt="result" />
    </div>
    <div class="result-type">
      <div class="type-name">Amy型人格</div>
      <div class="type-desc">哈哈哈哈哈哈哈哈，<br>嘿嘿嘿嘿嘿嘿。</div>
    </div>
    <button class="btn-secondary" onclick="restartTest()">重新测评</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "你独自一人在深夜，突然听到楼上传来奇怪的声音，你会……",
    opts: ["立刻拿起拖鞋准备迎战", "假装没听见，继续刷手机", "躲进被子里假装自己不存在", "冲上去大喊「有人吗！」"]
  },
  {
    q: "如果你的人生是一道菜，你最像……",
    opts: ["老干妈拌饭（百搭实用，朴实无华）", "榴莲（爱的人狂爱，不爱的绕道走）", "泡面（快、便宜、人生赢家）", "白开水（无色无味，但你离不开我）"]
  },
  {
    q: "朋友问你「今天吃什么」，你的第一反应是……",
    opts: ["「随便」（但随便不行）", "立刻发出30道菜的菜单", "「你决定」（但你决定也不行）", "直接挂电话，发一个地址"]
  },
  {
    q: "你认为自己在朋友群里扮演的角色是……",
    opts: ["永远在发表情包的那个", "负责接话接到全场沉默的那个", "从来不说话但必须在场的那个", "莫名其妙成为核心的那个"]
  },
  {
    q: "你一般怎么设闹钟？",
    opts: ["6:00，一个正经人", "7:30、7:35、7:40……设了12个", "从来不设，凭感觉活着", "设了又删，删了又设，最终还是迟到"]
  },
  {
    q: "你觉得自己最大的优点是什么？",
    opts: ["话少，但说出来都是废话", "脸皮厚，百折不挠", "没有优点，但非常清楚这一点", "优点太多，一时说不完"]
  },
  {
    q: "在一场KTV，你通常会……",
    opts: ["抢麦，且只唱高音部分", "坐角落看手机，偶尔鼓掌", "点了歌自己不唱，看别人唱", "唱跑调但精神状态非常好"]
  },
  {
    q: "面对一个你不想参加的饭局，你会……",
    opts: ["「我最近身体不太好……」", "直接「不去」，简洁明了", "去了，但全程一言不发", "去了，吃完就走，完美收场"]
  },
  {
    q: "你睡前最常干的事是什么？",
    opts: ["刷视频刷到天亮", "开始反思今天说错的每一句话", "规划明天，然后明天一件没做", "什么都没干，就是睡不着"]
  },
  {
    q: "最后一题：如果用一种动物形容你，你觉得自己是……",
    opts: ["狮子——霸气，我说了算", "考拉——吃了睡，睡了吃", "狐狸——聪明，但懒得用", "鱼——不知道在想什么，可能也没在想"]
  }
];

let current = 0;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startTest() {
  show('screen-question');
  renderQuestion(0);
}

function renderQuestion(i) {
  current = i;
  const pct = Math.round((i + 1) / questions.length * 100);
  document.getElementById('q-counter').textContent = `第 ${i+1} / ${questions.length} 题`;
  document.getElementById('q-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-text').textContent = questions[i].q;

  const cont = document.getElementById('q-options');
  cont.innerHTML = '';
  questions[i].opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = o;
    btn.onclick = () => {
      if (current < questions.length - 1) {
        renderQuestion(current + 1);
      } else {
        showLoading();
      }
    };
    cont.appendChild(btn);
  });
}

function showLoading() {
  show('screen-loading');
  const steps = [
    '✅ 收集行为特征数据…',
    '✅ 匹配荣格原型矩阵…',
    '✅ 分析潜意识倾向…',
    '✅ 计算 MBTI 维度权重…',
    '✅ 生成专属性格报告…',
    '🔒 数据加密传输中…'
  ];
  const titles = ['正在分析你的回答…', '构建神经行为模型…', '匹配数据库中…', '即将揭晓结果！'];
  const cont = document.getElementById('loading-steps');
  cont.innerHTML = '';
  let i = 0;
  const iv = setInterval(() => {
    document.getElementById('loading-title').textContent = titles[Math.min(Math.floor(i / 2), titles.length - 1)];
    if (i < steps.length) {
      cont.innerHTML += steps[i] + '<br>';
      i++;
    } else {
      clearInterval(iv);
      setTimeout(() => show('screen-result'), 700);
    }
  }, 480);
}

function restartTest() {
  show('screen-intro');
}
</script>
</body>
</html>
